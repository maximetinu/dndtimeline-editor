<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#09090b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Tierras perdidas, sueños encontrados — Timeline</title>
  <meta name="description" content="Cronología de la campaña de D&D «Tierras perdidas, sueños encontrados»." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Spectral:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="theme-arcane.css" />
</head>
<body>
  <div class="app">
    <!-- Top bar -->
    <header class="topbar">
      <div class="brand">
        <div class="brand-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 22h14"/><path d="M5 2h14"/>
            <path d="M17 22v-4.172a2 2 0 0 0-.586-1.414L12 12l-4.414 4.414A2 2 0 0 0 7 17.828V22"/>
            <path d="M7 2v4.172a2 2 0 0 0 .586 1.414L12 12l4.414-4.414A2 2 0 0 0 17 6.172V2"/>
          </svg>
        </div>
        <div class="brand-text">
          <h1>Fantasy Timeline</h1>
          <span>Campaña de D&amp;D</span>
        </div>
      </div>
    </header>

    <!-- Canvas -->
    <main class="canvas">
      <div class="canvas-header">
        <div class="title-row">
          <span class="hourglass" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 22h14"/><path d="M5 2h14"/>
              <path d="M17 22v-4.172a2 2 0 0 0-.586-1.414L12 12l-4.414 4.414A2 2 0 0 0 7 17.828V22"/>
              <path d="M7 2v4.172a2 2 0 0 0 .586 1.414L12 12l4.414-4.414A2 2 0 0 0 17 6.172V2"/>
            </svg>
          </span>
          <h2 id="timeline-title">Tierras perdidas, sueños encontrados</h2>
        </div>
        <div class="meta-row">
          <span class="chip" id="calendar-chip">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 10.5V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h6"/>
              <path d="M3 10h18"/><path d="M16 2v4"/><path d="M8 2v4"/><circle cx="18" cy="18" r="3"/>
            </svg>
            <span id="calendar-name">Gregorian</span>
          </span>
          <span class="chip muted" id="event-count"></span>
        </div>
      </div>

      <div class="chronicle" id="chronicle">
        <!-- events injected here -->
      </div>
    </main>

    <footer class="footer">
      <p>Cronología de <strong>Tierras perdidas, sueños encontrados</strong> · estilo inspirado en LegendKeeper</p>
      <button id="lock-btn" class="lock-btn" title="Editar" aria-label="Editar">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <span class="lock-label">Editar</span>
      </button>
    </footer>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
